<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60">
  <defs>
    <clipPath id="bgClip">
      <rect x="0" y="0" width="320" height="60" rx="10"/>
    </clipPath>
  </defs>
  <!-- Dark green background -->
  <rect width="320" height="60" rx="10" fill="#0D5C2E"/>
  <!-- Speed lines -->
  <g clip-path="url(#bgClip)" opacity="0.18">
    <line x1="-20" y1="70" x2="40" y2="-10" stroke="#fff" stroke-width="7"/>
    <line x1="5" y1="70" x2="65" y2="-10" stroke="#fff" stroke-width="4"/>
    <line x1="30" y1="70" x2="90" y2="-10" stroke="#fff" stroke-width="7"/>
    <line x1="55" y1="70" x2="115" y2="-10" stroke="#fff" stroke-width="4"/>
    <line x1="80" y1="70" x2="140" y2="-10" stroke="#fff" stroke-width="7"/>
    <line x1="105" y1="70" x2="165" y2="-10" stroke="#fff" stroke-width="4"/>
    <line x1="130" y1="70" x2="190" y2="-10" stroke="#fff" stroke-width="7"/>
    <line x1="155" y1="70" x2="215" y2="-10" stroke="#fff" stroke-width="4"/>
    <line x1="180" y1="70" x2="240" y2="-10" stroke="#fff" stroke-width="7"/>
    <line x1="205" y1="70" x2="265" y2="-10" stroke="#fff" stroke-width="4"/>
    <line x1="230" y1="70" x2="290" y2="-10" stroke="#fff" stroke-width="7"/>
    <line x1="255" y1="70" x2="315" y2="-10" stroke="#fff" stroke-width="4"/>
    <line x1="280" y1="70" x2="340" y2="-10" stroke="#fff" stroke-width="7"/>
  </g>
  <!-- Inner border frame -->
  <rect x="4" y="4" width="312" height="52" rx="7" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
  <!-- FORMZ bold text -->
  <text x="132" y="43" text-anchor="middle" font-family="'Inter','Arial Black',sans-serif" font-size="34" font-weight="900" fill="#FFFFFF" letter-spacing="4">FORMZ</text>
  <!-- STUDY lighter text -->
  <text x="262" y="43" text-anchor="middle" font-family="'Inter','Arial',sans-serif" font-size="28" font-weight="500" fill="#FFFFFF" letter-spacing="3" opacity="0.85">STUDY</text>
  <!-- Divider dot between FORMZ and STUDY -->
  <circle cx="195" cy="34" r="3" fill="#F9D616"/>
</svg>
