<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="260" height="70">
  <defs>
    <clipPath id="textClip">
      <rect x="8" y="8" width="244" height="54" rx="4"/>
    </clipPath>
  </defs>
  <!-- Background frame -->
  <rect x="0" y="0" width="260" height="70" rx="8" fill="#0D5C2E"/>
  <!-- Speed lines (diagonal stripes) behind text -->
  <g clip-path="url(#textClip)" opacity="0.25">
    <line x1="-10" y1="70" x2="50" y2="0" stroke="#FFFFFF" stroke-width="8"/>
    <line x1="10" y1="70" x2="70" y2="0" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="35" y1="70" x2="95" y2="0" stroke="#FFFFFF" stroke-width="8"/>
    <line x1="55" y1="70" x2="115" y2="0" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="80" y1="70" x2="140" y2="0" stroke="#FFFFFF" stroke-width="8"/>
    <line x1="100" y1="70" x2="160" y2="0" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="125" y1="70" x2="185" y2="0" stroke="#FFFFFF" stroke-width="8"/>
    <line x1="145" y1="70" x2="205" y2="0" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="170" y1="70" x2="230" y2="0" stroke="#FFFFFF" stroke-width="8"/>
    <line x1="190" y1="70" x2="250" y2="0" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="215" y1="70" x2="275" y2="0" stroke="#FFFFFF" stroke-width="8"/>
  </g>
  <!-- FORMZ text -->
  <text x="130" y="50" text-anchor="middle" font-family="'Inter', Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" letter-spacing="6">FORMZ</text>
  <!-- Border frame -->
  <rect x="4" y="4" width="252" height="62" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
</svg>
